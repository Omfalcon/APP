<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Application</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
        }

        /* Auth Page */
        .auth-page {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .auth-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 400px;
            padding: 40px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-card h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-bottom: 15px;
            padding: 10px;
            background: #ffe5e5;
            border-radius: 6px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* Chat Page */
        .chat-page {
            display: none;
            width: 100%;
            background: #f5f5f5;
        }

        .chat-page.show {
            display: flex;
        }

        .chat-sidebar {
            width: 300px;
            background: white;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        .user-info {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info-text h3 {
            font-size: 16px;
            margin-bottom: 5px;
        }

        .user-status {
            font-size: 12px;
            opacity: 0.9;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .users-section {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 10px;
            margin-top: 15px;
        }

        .user-item {
            padding: 12px;
            margin-bottom: 8px;
            background: #f9f9f9;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-item:hover {
            background: #e8f0ff;
            transform: translateX(5px);
        }

        .user-item.active {
            background: #e8f0ff;
            border-left: 3px solid #667eea;
            padding-left: 9px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
        }

        .user-item-text {
            flex: 1;
        }

        .user-item-name {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .user-item-status {
            font-size: 12px;
            color: #999;
        }

        .online-badge {
            width: 10px;
            height: 10px;
            background: #4caf50;
            border-radius: 50%;
            display: inline-block;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .chat-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 15px;
            min-height: 70px;
        }

        .chat-header.no-user {
            justify-content: center;
            color: #999;
            text-align: center;
        }

        .chat-header-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 18px;
        }

        .chat-header-text h2 {
            color: #333;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .chat-header-text p {
            font-size: 12px;
            color: #999;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: linear-gradient(to bottom, #ffffff 0%, #f5f7ff 100%);
        }

        .message {
            display: flex;
            gap: 8px;
            animation: messageSlide 0.3s ease-out;
            margin-bottom: 4px;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.own {
            justify-content: flex-end;
        }

        .message.other {
            justify-content: flex-start;
        }

        .message-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-width: 70%;
        }

        .message.own .message-content {
            align-items: flex-end;
        }

        .message.other .message-content {
            align-items: flex-start;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 14px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .message.other .message-bubble {
            background: white;
            color: #333;
            border: 1px solid #e8e8e8;
            border-bottom-left-radius: 4px;
        }

        .message.own .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-time {
            font-size: 12px;
            color: #aaa;
            padding: 0 8px;
        }

        .empty-chat {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #999;
            gap: 12px;
            text-align: center;
            padding: 20px;
        }

        .empty-chat-icon {
            font-size: 72px;
            opacity: 0.2;
        }

        .empty-chat > div:last-child {
            font-size: 15px;
            line-height: 1.5;
            max-width: 200px;
        }

        .input-area {
            padding: 16px 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: none;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.05);
        }

        .input-area.show {
            display: flex;
        }

        .input-container {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            width: 100%;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 24px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            max-height: 100px;
            min-height: 44px;
            transition: all 0.2s;
            background: #f9f9f9;
        }

        .message-input::placeholder {
            color: #bbb;
        }

        .message-input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .send-btn {
            padding: 12px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .send-btn:active {
            transform: translateY(0);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .chat-sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #e0e0e0;
            }

            .chat-main {
                display: none;
            }

            .chat-page.show-main .chat-main {
                display: flex;
            }

            .chat-page.show-main .chat-sidebar {
                display: none;
            }

            .message-bubble {
                max-width: 85%;
            }
        }

        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: currentColor;
            border-radius: 100%;
            opacity: 0;
            animation: loading 1s infinite;
        }

        @keyframes loading {
            0%, 39%, 100% {
                opacity: 0.3;
            }
            40% {
                opacity: 1;
            }
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Auth Page -->
        <div class="auth-page" id="authPage">
            <div class="auth-card">
                <h1>💬 Chat App</h1>

                <div class="tabs">
                    <button class="tab-btn" onclick="switchTab('login')">Login</button>
                    <button class="tab-btn active" onclick="switchTab('signup')">Sign Up</button>
                </div>

                <div id="errorMessage" class="error-message"></div>

                <!-- Login Tab -->
                <div id="loginTab" class="tab-content">
                    <div class="form-group">
                        <label for="loginUsername">Username</label>
                        <input type="text" id="loginUsername" placeholder="Enter your username">
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter your password">
                    </div>
                    <button class="submit-btn" onclick="handleLogin()">Login</button>
                </div>

                <!-- Signup Tab -->
                <div id="signupTab" class="tab-content active">
                    <div class="form-group">
                        <label for="signupUsername">Username</label>
                        <input type="text" id="signupUsername" placeholder="Choose a username">
                    </div>
                    <div class="form-group">
                        <label for="signupPassword">Password</label>
                        <input type="password" id="signupPassword" placeholder="Create a password">
                    </div>
                    <button class="submit-btn" onclick="handleSignup()">Sign Up</button>
                </div>
            </div>
        </div>

        <!-- Chat Page -->
        <div class="chat-page" id="chatPage">
            <!-- Sidebar -->
            <div class="chat-sidebar">
                <div class="user-info">
                    <div class="user-info-text">
                        <h3 id="currentUsername">User</h3>
                        <div class="user-status">
                            <span class="online-badge"></span> Online
                        </div>
                    </div>
                    <button class="logout-btn" onclick="handleLogout()">Logout</button>
                </div>

                <div class="users-section">
                    <div class="section-title">Online Users</div>
                    <div id="usersList"></div>
                </div>
            </div>

            <!-- Main Chat -->
            <div class="chat-main">
                <div class="chat-header no-user" id="chatHeader">
                    <div>Select a user to start chatting</div>
                </div>

                <div class="messages-container" id="messagesContainer">
                    <div class="empty-chat">
                        <div class="empty-chat-icon">💬</div>
                        <div>No messages yet. Start a conversation!</div>
                    </div>
                </div>

                <div class="input-area" id="inputArea">
                    <div class="input-container">
                        <textarea class="message-input" id="messageInput" placeholder="Type your message..." rows="1"></textarea>
                        <button class="send-btn" onclick="sendMessage()" id="sendBtn">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== State Management ==========
        let state = {
            token: localStorage.getItem('token') || null,
            currentUser: localStorage.getItem('username') || null,
            socket: null,
            isConnected: false,
            activeUsers: [],
            selectedUser: null,
            messages: {},
        };

        // ========== Initialize ==========
        window.addEventListener('DOMContentLoaded', () => {
            if (state.token && state.currentUser) {
                showChatPage();
                connectWebSocket();
            } else {
                showAuthPage();
            }

            // Auto-resize textarea
            const textarea = document.getElementById('messageInput');
            textarea.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 100) + 'px';
            });
        });

        // ========== Auth Functions ==========
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            if (tab === 'login') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('loginTab').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('signupTab').classList.add('active');
            }

            clearErrorMessage();
        }

        async function handleSignup() {
            const username = document.getElementById('signupUsername').value.trim();
            const password = document.getElementById('signupPassword').value.trim();

            if (!username || !password) {
                showError('Username and password are required');
                return;
            }

            if (username.length < 3) {
                showError('Username must be at least 3 characters');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }

            try {
                const response = await fetch('http://localhost:5001/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    state.token = data.token;
                    state.currentUser = data.username;
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', data.username);
                    showChatPage();
                    connectWebSocket();
                } else {
                    showError(data.error || 'Signup failed');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            }
        }

        async function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!username || !password) {
                showError('Username and password are required');
                return;
            }

            try {
                const response = await fetch('http://localhost:5001/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    state.token = data.token;
                    state.currentUser = data.username;
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', data.username);
                    showChatPage();
                    connectWebSocket();
                } else {
                    showError(data.error || 'Login failed');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            }
        }

        function handleLogout() {
            if (state.socket) {
                state.socket.disconnect();
            }
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            state.token = null;
            state.currentUser = null;
            state.socket = null;
            state.isConnected = false;
            showAuthPage();
            clearFormFields();
        }

        // ========== UI Functions ==========
        function showAuthPage() {
            document.getElementById('authPage').style.display = 'flex';
            document.getElementById('chatPage').classList.remove('show');
        }

        function showChatPage() {
            document.getElementById('authPage').style.display = 'none';
            document.getElementById('chatPage').classList.add('show');
            document.getElementById('currentUsername').textContent = state.currentUser;
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 5000);
        }

        function clearErrorMessage() {
            document.getElementById('errorMessage').classList.remove('show');
        }

        function clearFormFields() {
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('signupUsername').value = '';
            document.getElementById('signupPassword').value = '';
        }

        // ========== WebSocket Connection ==========
        function connectWebSocket() {
            if (!state.token) return;

            state.socket = io('http://localhost:5001', {
                query: { token: state.token },
                auth: { token: state.token }
            });

            state.socket.on('connect', () => {
                state.isConnected = true;
            });

            state.socket.on('disconnect', () => {
                state.isConnected = false;
            });

            state.socket.on('active_users', (data) => {
                state.activeUsers = data.users.filter(u => u !== state.currentUser);
                updateUsersList();
            });

            state.socket.on('receive_message', (data) => {
                if (!state.messages[data.sender]) {
                    state.messages[data.sender] = [];
                }
                state.messages[data.sender].push({
                    sender: data.sender,
                    content: data.content,
                    timestamp: new Date(data.timestamp),
                    own: false
                });

                if (state.selectedUser === data.sender) {
                    displayMessages(data.sender);
                    scrollToBottom();
                }
            });

            state.socket.on('chat_history', (data) => {
                if (state.selectedUser) {
                    const serverTime = new Date(data.server_time);
                    state.messages[state.selectedUser] = data.messages.map(msg => ({
                        sender: msg.sender,
                        content: msg.content,
                        timestamp: new Date(msg.timestamp),
                        serverTime: serverTime, // Store server time reference
                        own: msg.sender === state.currentUser
                    }));
                    displayMessages(state.selectedUser);
                    scrollToBottom();
                }
            });
        }

        // ========== Chat Functions ==========
        function selectUser(username) {
            state.selectedUser = username;
            updateUsersList();
            updateChatHeader(username);
            document.getElementById('inputArea').classList.add('show');

            if (state.messages[username]) {
                displayMessages(username);
                scrollToBottom();
            } else {
                loadChatHistory(username);
            }

            document.getElementById('messageInput').focus();
        }

        function loadChatHistory(username) {
            if (state.socket && state.isConnected) {
                state.socket.emit('get_chat_history', {
                    user1: state.currentUser,
                    user2: username,
                    limit: 100
                });
            }
        }

        function sendMessage() {
            if (!state.selectedUser) return;

            const content = document.getElementById('messageInput').value.trim();
            if (!content) return;

            state.socket.emit('send_message', {
                sender: state.currentUser,
                receiver: state.selectedUser,
                content: content
            });

            if (!state.messages[state.selectedUser]) {
                state.messages[state.selectedUser] = [];
            }

            state.messages[state.selectedUser].push({
                sender: state.currentUser,
                content: content,
                timestamp: new Date(),
                own: true
            });

            document.getElementById('messageInput').value = '';
            document.getElementById('messageInput').style.height = 'auto';
            displayMessages(state.selectedUser);
            scrollToBottom();
        }

        function displayMessages(username) {
            const container = document.getElementById('messagesContainer');
            const messages = state.messages[username] || [];

            if (messages.length === 0) {
                container.innerHTML = '<div class="empty-chat"><div class="empty-chat-icon">💬</div><div>No messages yet. Start a conversation!</div></div>';
                return;
            }

            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.own ? 'own' : 'other'}">
                    <div class="message-content">
                        <div class="message-bubble">${escapeHtml(msg.content)}</div>
                        <div class="message-time">${formatTime(msg.timestamp)}</div>
                    </div>
                </div>
            `).join('');
        }

        function updateChatHeader(username) {
            const header = document.getElementById('chatHeader');
            header.innerHTML = `
                <div class="chat-header-avatar">${username.charAt(0).toUpperCase()}</div>
                <div class="chat-header-text">
                    <h2>${username}</h2>
                    <p>Online</p>
                </div>
            `;
            header.classList.remove('no-user');
        }

        function updateUsersList() {
            const usersList = document.getElementById('usersList');
            
            if (state.activeUsers.length === 0) {
                usersList.innerHTML = '<div style="color: #999; padding: 20px; text-align: center;">No users online</div>';
                return;
            }

            usersList.innerHTML = state.activeUsers.map(user => `
                <div class="user-item ${state.selectedUser === user ? 'active' : ''}" onclick="selectUser('${user}')">
                    <div class="user-avatar">${user.charAt(0).toUpperCase()}</div>
                    <div class="user-item-text">
                        <div class="user-item-name">${user}</div>
                        <div class="user-item-status"><span class="online-badge"></span> Online</div>
                    </div>
                </div>
            `).join('');
        }

        function scrollToBottom() {
            const container = document.getElementById('messagesContainer');
            setTimeout(() => {
                container.scrollTop = container.scrollHeight;
            }, 0);
        }

        function formatTime(timestamp) {
            // Handle various timestamp formats
            let date;
            
            if (typeof timestamp === 'string') {
                // Parse ISO format string (e.g., "2026-04-18T22:05:00.123456+00:00")
                date = new Date(timestamp);
            } else if (timestamp instanceof Date) {
                date = timestamp;
            } else if (typeof timestamp === 'number') {
                // Unix timestamp in milliseconds
                date = new Date(timestamp);
            } else {
                return 'now';
            }

            // Validate date
            if (isNaN(date.getTime())) {
                return 'now';
            }

            const now = new Date();
            const diffMs = now.getTime() - date.getTime();
            
            // If difference is negative or very small, show "now"
            if (diffMs < 0 || diffMs < 60000) {
                return 'now';
            }

            const minutes = Math.floor(diffMs / 60000);
            const hours = Math.floor(diffMs / 3600000);
            const days = Math.floor(diffMs / 86400000);

            if (minutes < 60) return `${minutes}m ago`;
            if (hours < 24) return `${hours}h ago`;
            if (days < 7) return `${days}d ago`;
            
            // For older messages, show date
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: date.getFullYear() !== now.getFullYear() ? 'numeric' : undefined });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== Keyboard Events ==========
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && document.activeElement.id === 'messageInput') {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
